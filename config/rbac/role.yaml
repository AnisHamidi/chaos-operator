---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - chaos.snappcloud.io
  resources:
  - networkchaos
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - chaos.snappcloud.io
  resources:
  - networkchaos/finalizers
  verbs:
  - update
- apiGroups:
  - chaos.snappcloud.io
  resources:
  - networkchaos/status
  verbs:
  - get
  - patch
  - update
